<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Practice - Year 7 NZ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#6366f1;--success:#22c55e;--error:#ef4444;
  --bg1:#0f0c29;--bg2:#302b63;--bg3:#24243e;
  --card:#fffffffa;--text:#1e1b4b;--muted:#6b7280;
}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:20px 16px 40px;
}
header{text-align:center;color:#fff;margin-bottom:28px;padding-top:12px}
header h1{font-size:2.2rem;font-weight:900;letter-spacing:-0.5px}
header p{opacity:.75;margin-top:4px;font-size:1rem}

.screen{width:100%;max-width:860px;display:none}
.screen.active{display:block}

/* HOME */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.topic-card{
  background:var(--card);border-radius:16px;padding:22px 14px 18px;
  text-align:center;cursor:pointer;transition:transform .18s,box-shadow .18s;
  border-top:5px solid #ccc;position:relative;user-select:none;
}
.topic-card:hover{transform:translateY(-5px);box-shadow:0 14px 36px #0006}
.topic-card .icon{font-size:2.2rem;display:block;margin-bottom:10px}
.topic-card .name{font-weight:700;font-size:.92rem;color:var(--text);line-height:1.3}
.topic-card .best{font-size:.72rem;color:var(--muted);margin-top:6px;min-height:16px}

/* QUIZ */
.quiz-box{
  background:var(--card);border-radius:22px;padding:32px;
  box-shadow:0 20px 60px #0005;
}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.badge{
  font-size:.82rem;font-weight:700;padding:5px 13px;
  border-radius:20px;color:#fff;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:55%;
}
.scorelabel{font-size:1rem;font-weight:800;color:var(--text)}
.prog-wrap{background:#e5e7eb;border-radius:8px;height:8px;margin-bottom:28px;overflow:hidden}
.prog-bar{height:100%;border-radius:8px;background:var(--primary);transition:width .35s ease}
.qnum{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.qtext{font-size:1.65rem;font-weight:800;color:var(--text);margin-bottom:28px;line-height:1.35}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.opt-btn{
  padding:16px 12px;border:2.5px solid #e5e7eb;border-radius:12px;
  background:#fff;font-size:1.15rem;font-weight:700;cursor:pointer;
  transition:all .14s;color:var(--text);line-height:1.2;
}
.opt-btn:hover:not(:disabled){border-color:var(--primary);background:#eef2ff;transform:scale(1.02)}
.opt-btn.correct{border-color:var(--success);background:#dcfce7;color:#15803d}
.opt-btn.wrong{border-color:var(--error);background:#fee2e2;color:#b91c1c}
.opt-btn:disabled{cursor:default}
.feedback{text-align:center;margin-top:20px;font-size:1.05rem;font-weight:700;min-height:26px}
.feedback.ok{color:var(--success)}.feedback.no{color:var(--error)}
.next-btn{
  display:none;width:100%;margin-top:20px;padding:15px;
  background:var(--primary);color:#fff;border:none;border-radius:12px;
  font-size:1.05rem;font-weight:800;cursor:pointer;transition:opacity .18s,transform .18s;
}
.next-btn.show{display:block}
.next-btn:hover{opacity:.9;transform:scale(1.01)}
.back-btn{
  background:none;border:none;color:#fff;font-size:.85rem;
  cursor:pointer;opacity:.75;margin-bottom:14px;padding:4px 0;
  display:flex;align-items:center;gap:6px;
}
.back-btn:hover{opacity:1}

/* RESULTS */
.res-box{
  background:var(--card);border-radius:22px;padding:40px 32px;
  text-align:center;box-shadow:0 20px 60px #0005;
}
.res-title{font-size:1.9rem;font-weight:900;color:var(--text);margin-bottom:6px}
.res-sub{color:var(--muted);font-size:.95rem;margin-bottom:28px}
.score-big{font-size:5rem;font-weight:900;color:var(--primary);line-height:1}
.score-den{font-size:2rem;color:var(--muted)}
.stars{font-size:2.4rem;margin:16px 0 8px}
.res-msg{font-size:1.05rem;color:var(--text);margin-bottom:24px}
.new-best{
  background:#fef3c7;border:2px solid #f59e0b;color:#92400e;
  border-radius:10px;padding:8px 18px;font-weight:700;
  font-size:.9rem;margin-bottom:22px;display:none;
}
.res-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{
  padding:13px 26px;border-radius:12px;font-size:.98rem;
  font-weight:800;cursor:pointer;transition:all .18s;
}
.btn-primary{background:var(--primary);color:#fff;border:none}
.btn-secondary{background:#fff;color:var(--text);border:2.5px solid #e5e7eb}
.btn:hover{transform:scale(1.04)}

/* SCORE BREAKDOWN */
.breakdown{margin-top:24px;text-align:left}
.breakdown h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px}
.q-row{
  display:flex;align-items:flex-start;gap:10px;padding:8px 0;
  border-bottom:1px solid #f3f4f6;font-size:.88rem;
}
.q-row:last-child{border-bottom:none}
.q-icon{font-size:1rem;flex-shrink:0;margin-top:1px}
.q-detail{color:var(--text);flex:1}
.q-detail strong{display:block;font-weight:700}
.q-detail span{color:var(--muted);font-size:.82rem}

/* Difficulty bar */
.diff-bar{display:flex;gap:8px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.diff-btn{
  padding:8px 20px;border-radius:20px;border:2px solid rgba(255,255,255,.3);
  cursor:pointer;font-weight:700;font-size:.85rem;
  background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);
  transition:all .18s;
}
.diff-btn:hover{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.6);color:#fff}
.diff-btn.active{border-color:transparent;color:#fff}

/* Diagram */
.diagram{
  background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:12px;
  padding:12px 8px;margin-bottom:22px;display:flex;justify-content:center;
}
.diagram svg{max-width:280px;width:100%;height:auto}
.diagram.hidden{display:none}

/* Confetti */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;overflow:hidden}
.conf{
  position:absolute;top:-10px;width:10px;height:10px;
  border-radius:2px;animation:fall linear forwards;
}
@keyframes fall{
  to{transform:translateY(100vh) rotate(720deg);opacity:0}
}

@media(max-width:520px){
  header h1{font-size:1.7rem}
  .quiz-box{padding:22px 16px}
  .qtext{font-size:1.3rem}
  .opts{grid-template-columns:1fr}
  .opt-btn{font-size:1rem;padding:13px}
  .score-big{font-size:4rem}
}
</style>
</head>
<body>

<header>
  <h1>Maths Practice</h1>
  <p>Year 7 &mdash; New Zealand Curriculum</p>
</header>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="diff-bar" id="diffBar"></div>
  <div class="grid" id="topicGrid"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <button class="back-btn" onclick="showHome()">&#8592; Choose Topic</button>
  <div class="quiz-box">
    <div class="qhead">
      <span class="badge" id="badge"></span>
      <span class="scorelabel" id="scorelabel">0 / 0</span>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
    <div class="qnum" id="qnum">Question 1 of 10</div>
    <div class="qtext" id="qtext"></div>
    <div class="diagram hidden" id="diagram"></div>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">Next Question &rarr;</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="res-box">
    <div class="res-title" id="resTitle">Quiz Complete!</div>
    <div class="res-sub" id="resSub"></div>
    <div class="score-big"><span id="finalScore">0</span><span class="score-den">/10</span></div>
    <div class="stars" id="stars"></div>
    <div class="res-msg" id="resMsg"></div>
    <div class="new-best" id="newBest">&#127942; New personal best!</div>
    <div class="res-actions">
      <button class="btn btn-primary" onclick="retry()">Try Again</button>
      <button class="btn btn-secondary" onclick="showHome()">Choose Topic</button>
    </div>
    <div class="breakdown" id="breakdown"></div>
  </div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>
<div id="version" style="position:fixed;bottom:10px;right:14px;font-size:.65rem;color:rgba(255,255,255,.3);pointer-events:none;font-family:monospace;z-index:50;user-select:none"></div>

<script>
// ── Utilities ────────────────────────────────────────────────────────────────
const R=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

function shuffle(a){
  const arr=[...a];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function makeOpts(correct, wrongs){
  const cs = correct.toString();
  const pool = [...new Set(wrongs.map(w=>w.toString()).filter(w=>w!==cs && w!=='NaN' && !w.includes('undefined')))];
  while(pool.length<3){
    const n = Number(cs);
    if(!isNaN(n)){
      const try1=(n+pool.length+1).toString();
      if(!pool.includes(try1)&&try1!==cs) pool.push(try1);
    } else {
      pool.push('None of these');break;
    }
  }
  return shuffle([cs,...pool.slice(0,3)]);
}

function gcd(a,b){a=Math.abs(a);b=Math.abs(b);return b===0?a:gcd(b,a%b);}

// ── SVG Diagrams ─────────────────────────────────────────────────────────────
function dRect(l, w, unknownSide){
  const lLbl=unknownSide==='l'?'?':l+' m';
  const wLbl=unknownSide==='w'?'?':w+' m';
  return `<svg viewBox="0 0 220 140" xmlns="http://www.w3.org/2000/svg">
    <rect x="30" y="25" width="160" height="90" fill="#eef2ff" stroke="#6366f1" stroke-width="2.5" rx="3"/>
    <text x="110" y="16" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">${lLbl}</text>
    <text x="14" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b" transform="rotate(-90,14,70)">${wLbl}</text>
  </svg>`;
}

function dRightTriangle(base, height){
  return `<svg viewBox="0 0 220 165" xmlns="http://www.w3.org/2000/svg">
    <polygon points="30,130 180,130 30,25" fill="#dcfce7" stroke="#10b981" stroke-width="2.5"/>
    <path d="M30,115 L45,115 L45,130" fill="none" stroke="#10b981" stroke-width="1.8"/>
    <text x="105" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#1e1b4b">base = ${base} cm</text>
    <text x="12" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#1e1b4b" transform="rotate(-90,12,78)">height = ${height} cm</text>
    <text x="30" y="18" font-size="11" fill="#374151">right-angled triangle</text>
  </svg>`;
}

function dStraightLine(a){
  return `<svg viewBox="0 0 240 105" xmlns="http://www.w3.org/2000/svg">
    <line x1="10" y1="65" x2="230" y2="65" stroke="#374151" stroke-width="2.5"/>
    <line x1="120" y1="12" x2="120" y2="65" stroke="#6366f1" stroke-width="2.5"/>
    <path d="M145,65 A25,25 0 0,0 120,40" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="152" y="57" font-size="13" font-weight="700" fill="#ef4444">${a}°</text>
    <path d="M95,65 A25,25 0 0,1 120,40" fill="none" stroke="#6366f1" stroke-width="2"/>
    <text x="58" y="57" font-size="13" font-weight="700" fill="#6366f1">?</text>
    <text x="120" y="96" text-anchor="middle" font-size="11" fill="#6b7280">angles on a straight line = 180°</text>
  </svg>`;
}

function dTriangleAngles(a, b){
  return `<svg viewBox="0 0 220 165" xmlns="http://www.w3.org/2000/svg">
    <polygon points="110,18 18,145 202,145" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="110" y="11" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">${a}°</text>
    <text x="6" y="160" font-size="13" font-weight="700" fill="#374151">${b}°</text>
    <text x="202" y="160" text-anchor="end" font-size="14" font-weight="700" fill="#6366f1">?</text>
    <text x="110" y="160" text-anchor="middle" font-size="11" fill="#6b7280">angles in a triangle = 180°</text>
  </svg>`;
}

function dAngle(degrees){
  // cos(-r)=cos(r), sin(-r)=-sin(r) — rays go upward for positive angles
  const rad=degrees*Math.PI/180;
  const cx=80,cy=100,r=80,ar=30;
  // second ray
  const ex=+(cx+r*Math.cos(-rad)).toFixed(1);
  const ey=+(cy+r*Math.sin(-rad)).toFixed(1);
  // arc endpoint
  const ax=+(cx+ar*Math.cos(-rad)).toFixed(1);
  const ay=+(cy+ar*Math.sin(-rad)).toFixed(1);

  if(degrees===90){
    return `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
      <line x1="${cx}" y1="${cy}" x2="${cx+r}" y2="${cy}" stroke="#374151" stroke-width="2.5"/>
      <line x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy-r}" stroke="#374151" stroke-width="2.5"/>
      <rect x="${cx}" y="${cy-20}" width="20" height="20" fill="none" stroke="#6366f1" stroke-width="2"/>
    </svg>`;
  }
  if(degrees===180){
    return `<svg viewBox="0 0 240 90" xmlns="http://www.w3.org/2000/svg">
      <line x1="20" y1="65" x2="220" y2="65" stroke="#374151" stroke-width="2.5"/>
      <path d="M 90,65 A 30,30 0 0,0 150,65" fill="none" stroke="#6366f1" stroke-width="2"/>
      <text x="120" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#6366f1">180°</text>
    </svg>`;
  }
  if(degrees>180){
    // Reflex: show 90° reference with large arc
    return `<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
      <line x1="80" y1="100" x2="165" y2="100" stroke="#374151" stroke-width="2.5"/>
      <line x1="80" y1="100" x2="80" y2="20" stroke="#374151" stroke-width="2.5"/>
      <path d="M 120,100 A 40,40 0 1,0 80,60" fill="none" stroke="#6366f1" stroke-width="2.5"/>
      <text x="100" y="140" text-anchor="middle" font-size="12" fill="#6b7280">reflex — ${degrees}°</text>
    </svg>`;
  }
  // Acute and obtuse: sweep=0 (CCW in screen) draws arc through the opening
  const large=0;
  return `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
    <line x1="${cx}" y1="${cy}" x2="${cx+r}" y2="${cy}" stroke="#374151" stroke-width="2.5"/>
    <line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="#374151" stroke-width="2.5"/>
    <path d="M ${cx+ar},${cy} A ${ar},${ar} 0 ${large},0 ${ax},${ay}"
          fill="none" stroke="#6366f1" stroke-width="2"/>
    <text x="${cx+55}" y="${cy-25}" font-size="14" font-weight="700" fill="#374151">${degrees}°</text>
  </svg>`;
}

function dVerticallyOpposite(a){
  return `<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
    <line x1="15" y1="15" x2="185" y2="145" stroke="#374151" stroke-width="2.5"/>
    <line x1="185" y1="15" x2="15" y2="145" stroke="#374151" stroke-width="2.5"/>
    <text x="100" y="52" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">${a}°</text>
    <text x="100" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#6366f1">?</text>
    <text x="100" y="156" text-anchor="middle" font-size="11" fill="#6b7280">vertically opposite angles are equal</text>
  </svg>`;
}

function dCoInterior(a){
  return `<svg viewBox="0 0 220 185" xmlns="http://www.w3.org/2000/svg">
    <line x1="10" y1="52" x2="210" y2="52" stroke="#374151" stroke-width="2.5"/>
    <line x1="10" y1="132" x2="210" y2="132" stroke="#374151" stroke-width="2.5"/>
    <text x="168" y="47" font-size="12" fill="#374151">&#8594;</text>
    <text x="168" y="127" font-size="12" fill="#374151">&#8594;</text>
    <line x1="65" y1="8" x2="145" y2="175" stroke="#6366f1" stroke-width="2.5"/>
    <text x="92" y="50" font-size="13" font-weight="700" fill="#ef4444">${a}°</text>
    <text x="92" y="128" font-size="14" font-weight="700" fill="#6366f1">?</text>
    <text x="110" y="180" text-anchor="middle" font-size="11" fill="#6b7280">co-interior angles add to 180°</text>
  </svg>`;
}

// ── Difficulty ───────────────────────────────────────────────────────────────
const DIFFICULTIES=[
  {id:1,name:'Easy',    color:'#22c55e',desc:'Building blocks'},
  {id:2,name:'Medium',  color:'#f59e0b',desc:'Year 7 standard'},
  {id:3,name:'Hard',    color:'#ef4444',desc:'Push yourself'},
  {id:4,name:'Genius',  color:'#8b5cf6',desc:'Extension level'},
];
let difficulty=2;

// ── Question Generators ─────────────────────────────────────────────────────
function qAddSub(){
  const df=difficulty,t=R(0,3);
  if(df===1){
    if(t===0){const a=R(10,60),b=R(10,40),ans=a+b;return{q:`${a} + ${b} = ?`,a:ans,w:[ans+1,ans-1,ans+10,ans-10]};}
    if(t===1){const a=R(20,80),b=R(5,a-5),ans=a-b;return{q:`${a} − ${b} = ?`,a:ans,w:[ans+1,ans-1,ans+10,ans+5]};}
    if(t===2){const b=R(5,30),sum=R(b+10,60),a=sum-b;return{q:`${a} + ___ = ${sum}`,a:b,w:[b+1,b-1,b+5,b+10]};}
    const a=R(10,40),b=R(5,20),c=R(5,15),ans=a+b+c;return{q:`${a} + ${b} + ${c} = ?`,a:ans,w:[ans+1,ans-1,ans+5,ans-5]};
  }
  if(df===2){
    if(t===0){const a=R(100,799),b=R(100,999-a),ans=a+b;return{q:`${a} + ${b} = ?`,a:ans,w:[ans+1,ans-1,ans+10,ans-10,ans+100,ans-100]};}
    if(t===1){const a=R(300,999),b=R(100,a-50),ans=a-b;return{q:`${a} − ${b} = ?`,a:ans,w:[ans+1,ans-1,ans+10,ans-10,ans+100]};}
    if(t===2){const b=R(50,300),sum=R(b+200,900),a=sum-b;return{q:`${a} + ___ = ${sum}`,a:b,w:[b+1,b-1,b+10,b-10,b+100]};}
    const a=R(50,200),b=R(20,100),c=R(10,80),ans=a+b+c;return{q:`${a} + ${b} + ${c} = ?`,a:ans,w:[ans+1,ans-1,ans+10,ans-10,ans+5]};
  }
  if(df===3){
    if(t===0){const a=R(1000,7999),b=R(1000,9999-a),ans=a+b;return{q:`${a} + ${b} = ?`,a:ans,w:[ans+1,ans-1,ans+10,ans-10,ans+100,ans-100]};}
    if(t===1){const a=R(3000,9999),b=R(1000,a-500),ans=a-b;return{q:`${a} − ${b} = ?`,a:ans,w:[ans+1,ans-1,ans+10,ans-10,ans+100]};}
    if(t===2){const b=R(500,3000),sum=R(b+2000,9000),a=sum-b;return{q:`${a} + ___ = ${sum}`,a:b,w:[b+1,b-1,b+10,b-100,b+100]};}
    const a=R(1000,4000),b=R(500,2000),c=R(200,1000),ans=a+b+c;return{q:`${a} + ${b} + ${c} = ?`,a:ans,w:[ans+1,ans-1,ans+10,ans-10,ans+100]};
  }
  // Genius: decimals + BODMAS
  if(t===0){const a=(R(100,999)/10).toFixed(1),b=(R(100,999)/10).toFixed(1),ans=(+a+ +b).toFixed(1);return{q:`${a} + ${b} = ?`,a:ans,w:[(+ans+0.1).toFixed(1),(+ans-0.1).toFixed(1),(+ans+1).toFixed(1),(+ans-1).toFixed(1)]};}
  if(t===1){const a=R(10000,79999),b=R(10000,99999-a),ans=a+b;return{q:`${a} + ${b} = ?`,a:ans,w:[ans+1,ans-1,ans+10,ans-10,ans+100]};}
  if(t===2){const a=R(5,20),b=R(2,10),c=R(3,15),ans=a+b*c;return{q:`${a} + ${b} × ${c} = ?`,a:ans,w:[ans+b,ans-c,(a+b)*c,ans+1,ans-1]};}
  const a=R(2,8),b=R(2,8),c=R(1,5),ans=(a+b)*c;return{q:`(${a} + ${b}) × ${c} = ?`,a:ans,w:[a+b*c,ans+c,ans-c,ans+1]};
}

function qMultDiv(){
  const df=difficulty,t=R(0,4);
  if(df===1){

  }
  if(df===2){
    if(t===0){const sets=[[[4,8,6,2],5],[[10,14,12,8],11],[[3,7,5,9,6],6],[[12,8,10,14,16],12],[[4,6,8,10,12],8],[[5,9,7,11,3],7],[[2,6,4,8,10],6],[[15,5,10,20],12.5],[[6,2,4,8],5],[[9,3,6,12,15],9]];const[nums,mean]=sets[R(0,sets.length-1)];return{q:`Find the mean of:  ${nums.join(',  ')}`,a:mean,w:[mean+1,mean-1,mean+2,Math.max(...nums),Math.min(...nums)]};}
    if(t===1){const sets=[[[3,7,1,9,5],5],[[12,4,8,14,6],8],[[2,8,5,11,3],5],[[15,9,3,12,6],9],[[20,4,12,8,16],12],[[1,5,3,9,7],5]];const[nums,med]=sets[R(0,sets.length-1)];return{q:`Find the median of:  ${shuffle(nums).join(',  ')}`,a:med,w:[med+1,med-1,med+2,Math.max(...nums),Math.min(...nums)]};}
    if(t===2){const sets=[[[3,7,3,9,5,3],3],[[4,8,4,2,4,6],4],[[12,5,12,8,12,3],12],[[6,2,6,8,6,10],6],[[9,1,9,5,9,7],9],[[11,4,11,7,11,2],11]];const[nums,mode]=sets[R(0,sets.length-1)];return{q:`Find the mode of:  ${shuffle(nums).join(',  ')}`,a:mode,w:nums.filter(n=>n!==mode).slice(0,3).map(n=>n+(R(0,1)?0:1))};}
    const nums=[];while(nums.length<5)nums.push(R(2,20));const range=Math.max(...nums)-Math.min(...nums);return{q:`Find the range of:  ${nums.join(',  ')}`,a:range,w:[range+1,range-1,range+2,Math.max(...nums)]};
  }
  if(df===3){
    // Hard: find missing value from mean, simple probability
    if(t===0){const known=[R(3,12),R(3,12),R(3,12),R(3,12)];const mean=R(5,12);const missing=mean*5-known.reduce((a,b)=>a+b,0);if(missing<1||missing>20)return qStatistics();return{q:`The mean of 5 numbers is ${mean}. Four of them are ${known.join(', ')}. Find the fifth.`,a:missing,w:[missing+1,missing-1,missing+2,mean]};}
    if(t===1){const total=R(5,12);const fav=R(1,total-1);return{q:`A bag has ${total} balls. ${fav} are red. What is the probability of picking red?`,a:`${fav}/${total}`,w:[`${total-fav}/${total}`,`${fav}/${total-1}`,`${fav+1}/${total}`,`${fav}/${total+1}`]};}
    if(t===2){// frequency table mean
      const vals=[1,2,3,4,5];const freqs=vals.map(()=>R(1,5));const total=freqs.reduce((a,b)=>a+b,0);const sum=vals.reduce((s,v,i)=>s+v*freqs[i],0);const mean=(sum/total).toFixed(1);return{q:`Find the mean from this frequency table:\nValue: 1  2  3  4  5\nFreq:  ${freqs.join('  ')}`,a:mean,w:[(+mean+0.2).toFixed(1),(+mean-0.2).toFixed(1),(+mean+0.5).toFixed(1),(sum/vals.length).toFixed(1)].filter(x=>x!==mean)};}
    const n=R(4,8);const nums=[];while(nums.length<n)nums.push(R(2,25));const sorted=[...nums].sort((a,b)=>a-b);const med=n%2===0?(sorted[n/2-1]+sorted[n/2])/2:sorted[Math.floor(n/2)];
    return{q:`Find the median of:  ${shuffle(nums).join(', ')}`,a:med,w:[med+0.5,med-0.5,Math.max(...nums),nums[0]]};
  }
  // Genius: combined probability, outliers, IQR
  if(t===0){const r=R(2,5),g=R(2,5),b=R(2,5),total=r+g+b;return{q:`A bag has ${r} red, ${g} green, ${b} blue balls. P(not red) = ?`,a:`${g+b}/${total}`,w:[`${r}/${total}`,`${g}/${total}`,`${g+b}/${total+1}`,`${r+g}/${total}`]};}
  if(t===1){const nums=[R(5,12),R(5,12),R(5,12),R(5,12),R(5,12),R(5,12)].sort((a,b)=>a-b);const q1=nums[1],q3=nums[4],iqr=q3-q1;return{q:`For data: ${nums.join(', ')}\nQ1=${q1}, Q3=${q3}. Find the IQR.`,a:iqr,w:[iqr+1,iqr-1,q3,nums[nums.length-1]-nums[0]]};}
  if(t===2){const p1=R(1,4),p2=R(1,4),total=10;const pBoth=p1*p2;return{q:`P(A) = ${p1}/10, P(B) = ${p2}/10, events independent. P(A and B) = ?`,a:`${pBoth}/100`,w:[`${p1+p2}/10`,`${pBoth+1}/100`,`${pBoth}/10`,`${p1*p2}/20`]};}
  const mean=R(8,15),n=5,known=[R(5,mean),R(5,mean),R(mean,mean+5),R(mean,mean+5)];const missing=mean*n-known.reduce((a,b)=>a+b,0);if(missing<1||missing>30)return qStatistics();
  return{q:`Mean of 5 values is ${mean}. Four values: ${known.join(', ')}. Find the fifth.`,a:missing,w:[missing+1,missing-1,missing+2,mean]};
}

function qWordProblems(){
  const df=difficulty;
  const easy=[
    ()=>{const p=R(2,8),q=R(2,8),t=p*q;return{q:`Apples cost $${p} each. How much do ${q} apples cost?`,a:`$${t}`,w:[`$${t+p}`,`$${t-p}`,`$${p+q}`,`$${t+1}`]};},
    ()=>{const tot=R(10,50),sp=R(2,tot-2),left=tot-sp;return{q:`Sam has $${tot} and spends $${sp}. How much is left?`,a:`$${left}`,w:[`$${left+1}`,`$${left-1}`,`$${left+5}`,`$${tot+sp}`]};},
    ()=>{const ppd=R(2,6),days=R(3,7),tot=ppd*days;return{q:`Mia reads ${ppd} pages a day for ${days} days. How many pages total?`,a:`${tot}`,w:[tot+ppd,tot-ppd,ppd+days,tot+1]};},
    ()=>{const ppl=R(2,5),each=R(2,8),tot=ppl*each;return{q:`${ppl} friends share $${tot} equally. How much each?`,a:`$${each}`,w:[`$${each+1}`,`$${each-1}`,`$${tot}`,`$${ppl}`]};},
    ()=>{const bags=R(2,6),kg=R(1,4),tot=bags*kg;return{q:`Each bag weighs ${kg} kg. What is the total weight of ${bags} bags?`,a:`${tot} kg`,w:[`${tot+kg} kg`,`${tot-kg} kg`,`${bags+kg} kg`,`${tot+1} kg`]};},
  ];
  const medium=[
    ()=>{const p=R(2,15),q=R(3,12),t=p*q;return{q:`Pens cost $${p} each. How much do ${q} pens cost?`,a:`$${t}`,w:[`$${t+p}`,`$${t-p}`,`$${p+q}`,`$${t+1}`]};},
    ()=>{const tot=R(50,200),sp=R(10,tot-5),left=tot-sp;return{q:`Sam has $${tot} and spends $${sp}. How much is left?`,a:`$${left}`,w:[`$${left+1}`,`$${left-1}`,`$${left+10}`,`$${tot+sp}`]};},
    ()=>{const ppd=R(3,8),days=R(4,10),tot=ppd*days;return{q:`Mia reads ${ppd} pages a day for ${days} days. How many pages total?`,a:`${tot}`,w:[tot+ppd,tot-ppd,ppd+days,tot+1]};},
    ()=>{const ppl=R(3,8),each=R(5,20),tot=ppl*each;return{q:`${ppl} friends share $${tot} equally. How much each?`,a:`$${each}`,w:[`$${each+1}`,`$${each-1}`,`$${tot-each}`,`$${ppl+each}`]};},
    ()=>{const l=R(5,20),w=R(3,12),area=l*w;return{q:`A garden is ${l} m long and ${w} m wide. What is its area?`,a:`${area} m²`,w:[`${2*(l+w)} m²`,`${area+l} m²`,`${area-w} m²`,`${l+w} m²`]};},
    ()=>{const tot=R(100,400),p=[10,20,25,50][R(0,3)],disc=(tot*p)/100;return{q:`A store offers ${p}% off a $${tot} item. What is the discount?`,a:`$${disc}`,w:[`$${disc+10}`,`$${disc-10}`,`$${tot-disc}`,`$${disc*2}`]};},
    ()=>{const km=R(4,15),spd=R(5,10)*10;return{q:`A car travels ${km} km at ${spd} km/h. How many minutes for the trip?`,a:`${(km/spd*60).toFixed(0)} min`,w:[`${(km/spd*60+5).toFixed(0)} min`,`${(km/spd*60-5).toFixed(0)} min`,`${km*spd} min`,`${km+spd} min`]};},
    ()=>{const start=R(8,11),dur=R(1,3)*30;const end=start*60+R(0,1)*30+dur;const eh=Math.floor(end/60),em=end%60;return{q:`A show starts at ${start}:00 and runs for ${dur} minutes. When does it end?`,a:`${eh}:${em.toString().padStart(2,'0')}`,w:[`${eh+1}:${em.toString().padStart(2,'0')}`,`${eh}:${(em+10).toString().padStart(2,'0')}`,`${eh-1}:${em.toString().padStart(2,'0')}`,`${eh}:${(em+30).toString().padStart(2,'0')}`]};},
    ()=>{const orig=R(6,16)*5,save=[5,10,15,20][R(0,3)];const final=orig-save;if(final<=0)return medium[0]();return{q:`A shirt originally costs $${orig}. After saving $${save}, what is the sale price?`,a:`$${final}`,w:[`$${final+5}`,`$${final-5}`,`$${orig+save}`,`$${save}`]};},
  ];
  const hard=[
    ()=>{const orig=R(4,12)*20,pct=R(1,4)*10;const sale=orig*(1-pct/100);return{q:`A jacket costs $${orig}. It is reduced by ${pct}%. What is the sale price?`,a:`$${sale}`,w:[`$${sale+orig*pct/100}`,`$${orig-pct}`,`$${sale+10}`,`$${sale-10}`]};},
    ()=>{const rate=R(60,100),hrs=R(2,8)+(R(0,1)?0.5:0);const ans=rate*hrs;return{q:`A plumber charges $${rate}/hour. A job takes ${hrs} hours. What is the total cost?`,a:`$${ans}`,w:[`$${ans+rate}`,`$${ans-rate/2}`,`$${rate+hrs}`,`$${ans+10}`]};},
    ()=>{const dist=R(100,400),spd=R(60,120);const hrs=(dist/spd).toFixed(2);const hInt=Math.floor(dist/spd),hMin=Math.round((dist/spd-hInt)*60);if(hMin===0)return hard[1]();return{q:`A train travels ${dist} km at ${spd} km/h. How long does it take?`,a:`${hInt} h ${hMin} min`,w:[`${hInt+1} h ${hMin} min`,`${hInt} h ${hMin+10} min`,`${hInt} h ${hMin-5} min`,`${hInt-1} h ${hMin+15} min`]};},
    ()=>{const a=R(3,8),b=R(3,8),tot=a+b;const pA=Math.round(a/tot*100);return{q:`Class A has ${a} boys and ${b} girls. What percentage are girls?`,a:`${Math.round(b/tot*100)}%`,w:[`${Math.round(b/tot*100)+5}%`,`${Math.round(a/tot*100)}%`,`${Math.round(b/tot*100)-5}%`,`${b}%`]};},
    ()=>{const items=R(3,6),price=R(3,12),tax=10;const sub=items*price,taxAmt=sub*tax/100,total=sub+taxAmt;return{q:`${items} items at $${price} each with ${tax}% tax. What is the total?`,a:`$${total}`,w:[`$${sub}`,`$${total+taxAmt}`,`$${total-taxAmt}`,`$${total+price}`]};},
  ];
  const genius=[
    ()=>{const p=R(4,10)*10,q=R(3,8);const orig=p*q;const disc=[10,20,50][R(0,2)];const final=orig*(1-disc/100);return{q:`${q} items at $${p} each, then ${disc}% off the total. Final cost?`,a:`$${final}`,w:[`$${orig}`,`$${final+p}`,`$${orig*disc/100}`,`$${final-p}`]};},
    ()=>{const spd1=R(60,90),spd2=R(40,70),t1=R(1,3),t2=R(1,3);const d=spd1*t1+spd2*t2;return{q:`A car travels ${t1} h at ${spd1} km/h, then ${t2} h at ${spd2} km/h. Total distance?`,a:`${d} km`,w:[`${d+spd1} km`,`${d-spd2} km`,`${spd1+spd2} km`,`${d+t1*t2} km`]};},
    ()=>{const ratio=[R(2,5),R(2,5)];const total=R(6,15)*(ratio[0]+ratio[1]);const a=total*ratio[0]/(ratio[0]+ratio[1]);const b=total-a;return{q:`$${total} is split in the ratio ${ratio[0]}:${ratio[1]}. What is the larger share?`,a:`$${Math.max(a,b)}`,w:[`$${Math.min(a,b)}`,`$${Math.max(a,b)+ratio[0]}`,`$${total/2}`,`$${Math.max(a,b)-ratio[1]}`]};},
    ()=>{const wkly=R(300,800),taxFree=200,rate=R(15,30);const taxable=wkly-taxFree,tax=Math.round(taxable*rate/100),take=wkly-tax;return{q:`Weekly wage $${wkly}. First $${taxFree} tax-free, rest taxed at ${rate}%. Take-home pay?`,a:`$${take}`,w:[`$${take+tax}`,`$${take-50}`,`$${wkly-taxFree*rate/100}`,`$${take+10}`]};},
    ()=>{const n=R(3,6),each=R(4,10),extra=R(1,3);const ans=(n+extra)*each;return{q:`A recipe for ${n} people needs ${each} cups of flour. How much for ${n+extra} people?`,a:`${ans} cups`,w:[`${n*each+extra} cups`,`${ans+each} cups`,`${ans-each} cups`,`${(n+extra)*each+1} cups`]};},
  ];
  const pool=df===1?easy:df===2?medium:df===3?hard:genius;
  return pool[R(0,pool.length-1)]();
}

// ── Topic registry ───────────────────────────────────────────────────────────
const TOPICS=[
  {id:'addsub',    name:'Addition & Subtraction',        icon:'➕', color:'#ef4444', gen:qAddSub},
  {id:'multdiv',   name:'Multiplication & Division',     icon:'✖️',  color:'#f97316', gen:qMultDiv},
  {id:'fractions', name:'Fractions',                     icon:'½',   color:'#8b5cf6', gen:qFractions},
  {id:'decimals',  name:'Decimals & Percentages',        icon:'%',   color:'#06b6d4', gen:qDecimals},
  {id:'integers',  name:'Positive & Negative Numbers',   icon:'±',   color:'#14b8a6', gen:qIntegers},
  {id:'geometry',  name:'Area & Perimeter',              icon:'📐',  color:'#10b981', gen:qGeometry},
  {id:'angles',    name:'Angles',                        icon:'📏',  color:'#f59e0b', gen:qAngles},
  {id:'algebra',   name:'Basic Algebra',                 icon:'𝑥',   color:'#6366f1', gen:qAlgebra},
  {id:'stats',     name:'Statistics',                    icon:'📊',  color:'#ec4899', gen:qStatistics},
  {id:'word',      name:'Word Problems',                 icon:'💬',  color:'#0ea5e9', gen:qWordProblems},
];

// ── State ────────────────────────────────────────────────────────────────────
let topic=null, questions=[], qi=0, score=0, answered=false, results=[];

// ── High scores ──────────────────────────────────────────────────────────────
function hsKey(tid){return `${tid}_d${difficulty}`;}
function getHS(){try{return JSON.parse(localStorage.getItem('mathHS')||'{}')}catch{return{}}}
function saveHS(tid,s){const k=hsKey(tid),h=getHS(),prev=h[k]||0;if(s>prev){h[k]=s;localStorage.setItem('mathHS',JSON.stringify(h));return true;}return false;}
function stars(s){return s>=9?'⭐⭐⭐':s>=7?'⭐⭐':s>=5?'⭐':''}

// ── Difficulty bar ────────────────────────────────────────────────────────────
function renderDiffBar(){
  document.getElementById('diffBar').innerHTML=DIFFICULTIES.map(d=>
    `<button class="diff-btn${d.id===difficulty?' active':''}"
      style="${d.id===difficulty?`background:${d.color}`:''}"
      onclick="setDifficulty(${d.id})">${d.name}</button>`
  ).join('');
}
function setDifficulty(id){
  difficulty=id;
  renderDiffBar();
  renderHome();
}

// ── Home ──────────────────────────────────────────────────────────────────────
function renderHome(){
  renderDiffBar();
  const hs=getHS();
  document.getElementById('topicGrid').innerHTML=TOPICS.map(t=>{
    const b=hs[hsKey(t.id)];
    const bestTxt=b!=null?`${stars(b)} Best: ${b}/10`:'Not played yet';
    return `<div class="topic-card" onclick="startQuiz('${t.id}')" style="border-top-color:${t.color}">
      <span class="icon">${t.icon}</span>
      <div class="name">${t.name}</div>
      <div class="best">${bestTxt}</div>
    </div>`;
  }).join('');
}

// ── Build question ────────────────────────────────────────────────────────────
function buildQ(raw){
  const answer=String(raw.a);
  const options=raw.opts||makeOpts(answer,raw.w||[]);
  return {question:raw.q, answer, options, diagram:raw.d||null};
}

// ── Quiz ──────────────────────────────────────────────────────────────────────
function startQuiz(id){
  topic=TOPICS.find(t=>t.id===id);
  questions=[];results=[];qi=0;score=0;answered=false;
  const seen=new Set();
  for(let i=0;i<10;i++){
    let q=null,tries=0;
    do{
      try{
        const built=buildQ(topic.gen());
        const key=built.question+'|'+built.answer;
        if(!seen.has(key)){q=built;seen.add(key);}
      }catch(e){}
      tries++;
    }while(!q&&tries<25);
    questions.push(q||{question:'3 × 4 = ?',answer:'12',options:['12','11','13','14'],diagram:null});
  }
  showScreen('quiz');renderQ();
}

function renderQ(){
  const q=questions[qi];
  const dname=DIFFICULTIES.find(d=>d.id===difficulty).name;
  document.getElementById('badge').textContent=`${topic.name} · ${dname}`;
  document.getElementById('badge').style.background=topic.color;
  document.getElementById('scorelabel').textContent=`${score} / ${qi}`;
  document.getElementById('qnum').textContent=`Question ${qi+1} of 10`;
  document.getElementById('qtext').textContent=q.question;
  const diagramEl=document.getElementById('diagram');
  if(q.diagram){diagramEl.innerHTML=q.diagram;diagramEl.classList.remove('hidden');}
  else{diagramEl.innerHTML='';diagramEl.classList.add('hidden');}
  document.getElementById('progBar').style.width=`${qi*10}%`;

  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.options.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=opt;
    btn.dataset.val=opt;
    btn.addEventListener('click',()=>pick(btn,q));
    opts.appendChild(btn);
  });

  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  const nb=document.getElementById('nextBtn');
  nb.classList.remove('show');
  nb.textContent=qi===9?'See Results →':'Next Question →';
  answered=false;
}

function pick(btn,q){
  if(answered)return;
  answered=true;
  const correct=btn.dataset.val===q.answer;
  if(correct)score++;
  results.push({question:q.question,answer:q.answer,chosen:btn.dataset.val,correct});

  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===q.answer)b.classList.add('correct');
    else if(b===btn&&!correct)b.classList.add('wrong');
  });

  const fb=document.getElementById('feedback');
  if(correct){
    const msgs=['Correct!','Nice work!','Well done!','Brilliant!','Spot on!','Excellent!','Yes!'];
    fb.textContent=msgs[R(0,msgs.length-1)];fb.className='feedback ok';
  } else {
    fb.textContent=`Not quite — the answer is ${q.answer}`;fb.className='feedback no';
  }
  document.getElementById('scorelabel').textContent=`${score} / ${qi+1}`;
  document.getElementById('nextBtn').classList.add('show');
}

function nextQ(){qi++;if(qi>=10)showResults();else renderQ();}

// ── Results ───────────────────────────────────────────────────────────────────
function getResultMsg(s){
  if(s===10)return'Perfect score! You are a maths superstar!';
  if(s>=9)return'Outstanding! Nearly perfect!';
  if(s>=7)return'Great work! You really know your stuff!';
  if(s>=5)return'Good effort! Keep practising and you\'ll get there!';
  if(s>=3)return'Keep going — practice makes perfect!';
  return'Don\'t give up! Have another go!';
}

function showResults(){
  showScreen('results');
  const isNew=saveHS(topic.id,score);
  const dname=DIFFICULTIES.find(d=>d.id===difficulty).name;

  document.getElementById('resTitle').textContent=score>=7?'Well done!':'Quiz complete!';
  document.getElementById('resSub').textContent=`${topic.name} — ${dname}`;
  document.getElementById('finalScore').textContent=score;
  document.getElementById('stars').textContent=score>=9?'⭐⭐⭐':score>=7?'⭐⭐':score>=5?'⭐':'💪';
  document.getElementById('resMsg').textContent=getResultMsg(score);
  const nb=document.getElementById('newBest');
  nb.style.display=(isNew&&score>0)?'block':'none';

  // Breakdown
  const bd=document.getElementById('breakdown');
  bd.innerHTML=`<h3>Question Review</h3>`+results.map((r,i)=>`
    <div class="q-row">
      <span class="q-icon">${r.correct?'✅':'❌'}</span>
      <div class="q-detail">
        <strong>${r.question}</strong>
        <span>${r.correct?`Correct: ${r.answer}`:`Your answer: ${r.chosen} &nbsp;&bull;&nbsp; Correct: ${r.answer}`}</span>
      </div>
    </div>`).join('');

  if(score>=8)launchConfetti();
}

function retry(){startQuiz(topic.id);}
function showHome(){showScreen('home');renderHome();}

// ── Confetti ──────────────────────────────────────────────────────────────────
function launchConfetti(){
  const wrap=document.getElementById('confettiWrap');
  wrap.innerHTML='';
  const colors=['#6366f1','#f97316','#22c55e','#ef4444','#f59e0b','#ec4899','#06b6d4'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='conf';
    c.style.cssText=`left:${R(0,100)}%;background:${colors[R(0,colors.length-1)]};
      animation-duration:${R(15,30)/10}s;animation-delay:${R(0,20)/10}s;
      width:${R(6,12)}px;height:${R(6,12)}px;border-radius:${R(0,1)?'50%':'2px'}`;
    wrap.appendChild(c);
  }
  setTimeout(()=>wrap.innerHTML='',4000);
}

// ── Screen management ─────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ── Init ──────────────────────────────────────────────────────────────────────
const VERSION='v24.05.2026.2143';
document.getElementById('version').textContent=VERSION;
renderHome();
</script>
